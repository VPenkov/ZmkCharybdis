---
include:
  # Left
  - board: nice_nano_v2
    shield: charybdis_left
    keymap: qwerty
    format: bt
    artifact-name: charybdis_qwerty_left
  # Right
  - board: nice_nano_v2
    shield: charybdis_right
    keymap: qwerty
    format: bt
    artifact-name: charybdis_qwerty_right
    # TEMP: swapped Studio-over-USB for Zephyr's cdc-acm-console snippet, which
    # creates the CDC node + sets zephyr,console so CONFIG_ZMK_USB_LOGGING can
    # attach. Restore `snippet: studio-rpc-usb-uart` when Enter debugging is done.
    snippet: cdc-acm-console
  # Firmware Reset
  - board: nice_nano_v2
    shield: settings_reset
    format: reset
    artifact-name: firmware_reset_nano_v2
